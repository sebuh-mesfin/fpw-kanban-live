<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freedom Pay Wallet â Kanban Board</title>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0a1628;--lime:#c6f135;--bg:#f0f2f5;--card:#fff;--border:#e2e5ea;--text:#1a1a2e;--muted:#6b7280;--shadow:0 1px 3px rgba(0,0,0,.08);--radius:8px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ===== LOGIN SCREEN ===== */
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--navy)}
.login-box{background:#fff;border-radius:16px;padding:40px;width:100%;max-width:400px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-box .logo-big{width:64px;height:64px;background:var(--lime);border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:28px;color:var(--navy);margin-bottom:16px}
.login-box h1{font-size:1.4rem;margin-bottom:4px;color:var(--navy)}
.login-box p{color:var(--muted);font-size:.9rem;margin-bottom:24px}
.login-box input{width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:8px;font-size:1rem;outline:none;margin-bottom:16px;font-family:inherit}
.login-box input:focus{border-color:var(--lime);box-shadow:0 0 0 3px rgba(198,241,53,.3)}
.login-box button{width:100%;padding:12px;background:var(--navy);color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;transition:all .15s}
.login-box button:hover{background:#162240}
.login-error{color:#dc2626;font-size:.85rem;margin-bottom:12px;display:none}

/* ===== APP (hidden until login) ===== */
.app{display:none}

/* HEADER */
.header{background:var(--navy);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:12px}
.logo{width:36px;height:36px;background:var(--lime);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;color:var(--navy)}
.header h1{color:#fff;font-size:1.2rem;font-weight:700;letter-spacing:-.3px}
.header h1 span{color:var(--lime)}
.header-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.btn{padding:8px 16px;border:none;border-radius:6px;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .15s}
.btn-lime{background:var(--lime);color:var(--navy)}
.btn-lime:hover{filter:brightness(.92)}
.btn-outline{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.25)}
.btn-outline:hover{border-color:var(--lime);color:var(--lime)}

/* ONLINE USERS */
.online-users{display:flex;align-items:center;gap:6px;margin-right:8px}
.online-dot{width:8px;height:8px;border-radius:50%;background:#10b981;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.online-avatars{display:flex;gap:-4px}
.avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.7rem;color:#fff;border:2px solid var(--navy);margin-left:-6px;cursor:default;position:relative}
.avatar:first-child{margin-left:0}
.avatar:hover .avatar-tooltip{display:block}
.avatar-tooltip{display:none;position:absolute;top:38px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:4px 10px;border-radius:5px;font-size:.72rem;white-space:nowrap;z-index:10;font-weight:400}
.online-count{color:rgba(255,255,255,.7);font-size:.78rem;white-space:nowrap}

/* ACTIVITY TOAST */
.toast-container{position:fixed;bottom:20px;right:20px;z-index:300;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--navy);color:#fff;padding:10px 16px;border-radius:8px;font-size:.82rem;box-shadow:0 8px 24px rgba(0,0,0,.2);animation:toastIn .3s ease,toastOut .3s ease 3.7s forwards;max-width:340px;pointer-events:auto}
.toast strong{color:var(--lime)}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateY(-10px)}}

/* TOOLBAR */
.toolbar{padding:12px 24px;background:#fff;border-bottom:1px solid var(--border);display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.search-box{flex:1;min-width:180px;max-width:360px;padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:.85rem;outline:none}
.search-box:focus{border-color:var(--lime);box-shadow:0 0 0 2px rgba(198,241,53,.25)}
.filter-select{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:.82rem;background:#fff;outline:none;min-width:120px}
.filter-select:focus{border-color:var(--lime)}
.task-count{margin-left:auto;font-size:.82rem;color:var(--muted);white-space:nowrap}

/* BOARD */
.board{display:flex;gap:16px;padding:20px 24px;overflow-x:auto;min-height:calc(100vh - 160px);align-items:flex-start}
.column{background:#e8ebf0;border-radius:10px;min-width:290px;max-width:340px;flex:1;display:flex;flex-direction:column}
.column-header{padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between}
.column-title{font-weight:700;font-size:.9rem;display:flex;align-items:center;gap:8px}
.column-count{background:rgba(0,0,0,.1);padding:2px 8px;border-radius:10px;font-size:.75rem;font-weight:600}
.col-todo .column-title{color:#3b82f6}
.col-inprogress .column-title{color:#f59e0b}
.col-paused .column-title{color:#ef4444}
.col-done .column-title{color:#10b981}
.add-task-btn{padding:4px 10px;background:transparent;border:1px dashed rgba(0,0,0,.2);border-radius:6px;font-size:.78rem;cursor:pointer;color:var(--muted);font-weight:600;transition:all .15s}
.add-task-btn:hover{border-color:var(--navy);color:var(--navy)}
.card-list{padding:8px 10px 14px;flex:1;min-height:60px;display:flex;flex-direction:column;gap:8px}

/* CARDS */
.card{background:var(--card);border-radius:var(--radius);padding:12px 14px;box-shadow:var(--shadow);cursor:grab;border:1px solid transparent;transition:all .15s}
.card:hover{box-shadow:0 4px 12px rgba(0,0,0,.1);border-color:var(--lime)}
.card.sortable-ghost{opacity:.4}
.card.sortable-chosen{box-shadow:0 8px 24px rgba(0,0,0,.15)}
.card-task{font-size:.85rem;font-weight:600;line-height:1.35;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.badge{padding:2px 8px;border-radius:4px;font-size:.7rem;font-weight:600;white-space:nowrap}
.badge-project{color:#fff}
.badge-owner{background:#eef2ff;color:#4338ca}
.badge-priority-High{background:#fef2f2;color:#dc2626}
.badge-priority-Medium{background:#fffbeb;color:#d97706}
.badge-priority-Low{background:#f0fdf4;color:#16a34a}
.badge-deadline{background:#f8fafc;color:#64748b;font-size:.7rem}
.card-hidden{display:none!important}

/* DELETE BTN */
.card-delete{position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:4px;border:none;background:transparent;color:#cbd5e1;font-size:14px;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1}
.card{position:relative}
.card:hover .card-delete{display:flex}
.card-delete:hover{background:#fef2f2;color:#dc2626}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;justify-content:center;align-items:flex-start;padding:40px 16px;overflow-y:auto}
.modal-overlay.active{display:flex}
.modal{background:#fff;border-radius:12px;width:100%;max-width:600px;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:modalIn .2s ease}
@keyframes modalIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}
.modal-header{padding:20px 24px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.modal-header h2{font-size:1.05rem;font-weight:700}
.modal-close{width:32px;height:32px;border:none;background:#f1f5f9;border-radius:6px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:#e2e8f0}
.modal-body{padding:20px 24px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:.78rem;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:6px;font-size:.88rem;font-family:inherit;outline:none}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--lime);box-shadow:0 0 0 2px rgba(198,241,53,.25)}
.form-group textarea{resize:vertical;min-height:70px}
.modal-footer{padding:14px 24px 20px;display:flex;gap:8px;justify-content:flex-end}
.btn-primary{background:var(--navy);color:#fff}
.btn-primary:hover{background:#162240}
.btn-danger{background:#fee2e2;color:#dc2626}
.btn-danger:hover{background:#fecaca}
.btn-cancel{background:#f1f5f9;color:#475569}
.btn-cancel:hover{background:#e2e8f0}

/* FOOTER */
.footer{padding:14px 24px;text-align:center;border-top:1px solid var(--border);background:#fff}
.footer button{background:none;border:none;color:var(--muted);font-size:.78rem;cursor:pointer;text-decoration:underline}
.footer button:hover{color:#dc2626}
.footer .user-label{color:var(--muted);font-size:.78rem;margin-left:16px}

/* CONNECTION STATUS */
.conn-status{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.8);color:#fff;padding:16px 28px;border-radius:10px;font-size:.9rem;z-index:400;display:none;text-align:center}
.conn-status.show{display:block}

/* RESPONSIVE */
@media(max-width:768px){
  .board{padding:12px;gap:12px}
  .column{min-width:260px}
  .header{padding:10px 14px}
  .toolbar{padding:10px 14px}
}
</style>
</head>
<body>

<!-- ===== LOGIN SCREEN ===== -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="logo-big">F</div>
    <h1>Freedom Pay Wallet</h1>
    <p>Enter your name to join the Kanban board</p>
    <div class="login-error" id="loginError">Please enter your name</div>
    <input type="text" id="loginName" placeholder="Your name..." autofocus>
    <button onclick="doLogin()">Join Board</button>
  </div>
</div>

<!-- ===== MAIN APP ===== -->
<div class="app" id="app">
  <div class="header">
    <div class="header-left">
      <div class="logo">F</div>
      <h1>Freedom <span>Pay Wallet</span> â Kanban</h1>
    </div>
    <div class="header-actions">
      <div class="online-users">
        <span class="online-dot"></span>
        <div class="online-avatars" id="onlineAvatars"></div>
        <span class="online-count" id="onlineCount"></span>
      </div>
      <button class="btn btn-lime" onclick="exportCSV()">&#11015; Export CSV</button>
      <button class="btn btn-outline" id="logoutBtn" onclick="doLogout()">Log out</button>
    </div>
  </div>

  <div class="toolbar">
    <input type="text" class="search-box" id="searchBox" placeholder="Search tasks..." oninput="applyFilters()">
    <select class="filter-select" id="filterProject" onchange="applyFilters()"><option value="">All Projects</option></select>
    <select class="filter-select" id="filterOwner" onchange="applyFilters()"><option value="">All Owners</option></select>
    <select class="filter-select" id="filterPriority" onchange="applyFilters()"><option value="">All Priorities</option></select>
    <span class="task-count" id="taskCount"></span>
  </div>

  <div class="board" id="board">
    <div class="column col-todo">
      <div class="column-header"><span class="column-title">&#9899; To Do <span class="column-count" id="count-todo">0</span></span><button class="add-task-btn" onclick="openAddModal('todo')">+ Add</button></div>
      <div class="card-list" id="col-todo"></div>
    </div>
    <div class="column col-inprogress">
      <div class="column-header"><span class="column-title">&#9898; In Progress <span class="column-count" id="count-inprogress">0</span></span><button class="add-task-btn" onclick="openAddModal('inprogress')">+ Add</button></div>
      <div class="card-list" id="col-inprogress"></div>
    </div>
    <div class="column col-paused">
      <div class="column-header"><span class="column-title">&#128308; Paused <span class="column-count" id="count-paused">0</span></span><button class="add-task-btn" onclick="openAddModal('paused')">+ Add</button></div>
      <div class="card-list" id="col-paused"></div>
    </div>
    <div class="column col-done">
      <div class="column-header"><span class="column-title">&#9989; Done <span class="column-count" id="count-done">0</span></span><button class="add-task-btn" onclick="openAddModal('done')">+ Add</button></div>
      <div class="card-list" id="col-done"></div>
    </div>
  </div>

  <div class="footer">
    <button onclick="resetBoard()">Reset to original data</button>
    <span class="user-label" id="userLabel"></span>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Task Details</h2>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label>Project</label><input id="f-project"></div>
      <div class="form-group"><label>Task</label><input id="f-task"></div>
      <div class="form-group"><label>Output</label><input id="f-output"></div>
      <div class="form-group"><label>Notes</label><textarea id="f-notes"></textarea></div>
      <div class="form-group"><label>Owner</label><input id="f-owner"></div>
      <div class="form-group"><label>Priority</label>
        <select id="f-priority"><option value="">â</option><option value="High">High</option><option value="Medium">Medium</option><option value="Low">Low</option></select>
      </div>
      <div class="form-group"><label>Deadline</label><input id="f-deadline" type="date"></div>
      <div class="form-group"><label>Time (Hours)</label><input id="f-time" type="text"></div>
      <div class="form-group"><label>Time Taken</label><input id="f-timetaken" type="text"></div>
      <div class="form-group"><label>Links</label><input id="f-links"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="btnDelete" onclick="deleteTask()">Delete</button>
      <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveTask()">Save</button>
    </div>
  </div>
</div>

<!-- TOAST CONTAINER -->
<div class="toast-container" id="toastContainer"></div>

<!-- CONNECTION STATUS -->
<div class="conn-status" id="connStatus">Reconnecting...</div>

// ===== LOGIN =====
function doLogin() {
  const name = document.getElementById('loginName').value.trim();
  if (!name) {
    document.getElementById('loginError').style.display = 'block';
    return;
  }
  currentUser = name;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('userLabel').textContent = 'Logged in as: ' + name;
  socket.emit('join', name);
}

function doLogout() {
  location.reload();
}

document.getElementById('loginName').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') doLogin();
});

// ===== SOCKET EVENTS =====
socket.on('init', (data) => {
  if (data.tasks) {
    tasks = data.tasks;
  } else {
    tasks = getDefaultData();
    // First user - send default data to server
    socket.emit('task-added', { tasks, taskName: 'initial data' });
  }
  populateFilters();
  render();
  initSortable();
  updateOnlineUsers(data.onlineUsers || []);
});

socket.on('board-updated', (data) => {
  tasks = data.tasks;
  populateFilters();
  render();
  initSortable();
});

socket.on('users-updated', (users) => {
  updateOnlineUsers(users);
});

socket.on('activity', (data) => {
  showToast(data.user, data.action);
});

socket.on('disconnect', () => {
  document.getElementById('connStatus').classList.add('show');
  document.getElementById('connStatus').textContent = 'Connection lost. Reconnecting...';
});

socket.on('connect', () => {
  const status = document.getElementById('connStatus');
  if (status.classList.contains('show')) {
    status.textContent = 'Reconnected!';
    setTimeout(() => status.classList.remove('show'), 1500);
    if (currentUser) socket.emit('join', currentUser);
  }
});

// ===== ONLINE USERS =====
function updateOnlineUsers(users) {
  const container = document.getElementById('onlineAvatars');
  const countEl = document.getElementById('onlineCount');
  container.innerHTML = '';
  users.forEach(u => {
    const initials = u.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
    const div = document.createElement('div');
    div.className = 'avatar';
    div.style.background = u.color;
    div.textContent = initials;
    div.innerHTML += `<span class="avatar-tooltip">${escHtml(u.name)}</span>`;
    container.appendChild(div);
  });
  countEl.textContent = users.length + ' online';
}

// ===== TOAST =====
function showToast(user, action) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = `<strong>${escHtml(user)}</strong> ${escHtml(action)}`;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 4000);
}

// ===== RENDER =====
function render() {
  const cols = {todo:[], inprogress:[], paused:[], done:[]};
  tasks.forEach(t => { if (cols[t.column]) cols[t.column].push(t); });
  ['todo','inprogress','paused','done'].forEach(col => {
    const el = document.getElementById('col-' + col);
    el.innerHTML = '';
    cols[col].forEach(t => el.appendChild(createCard(t)));
  });
  updateCounts();
  applyFilters();
}

function createCard(t) {
  const div = document.createElement('div');
  div.className = 'card';
  div.dataset.id = t.id;
  const pColor = getProjectColor(t.project);
  let badges = '';
  if (t.project) badges += `<span class="badge badge-project" style="background:${pColor}">${escHtml(t.project)}</span>`;
  if (t.owner) badges += `<span class="badge badge-owner">${escHtml(t.owner)}</span>`;
  if (t.priority) badges += `<span class="badge badge-priority-${t.priority}">${t.priority}</span>`;
  if (t.deadline) badges += `<span class="badge badge-deadline">${escHtml(t.deadline)}</span>`;
  div.innerHTML = `<button class="card-delete" onclick="event.stopPropagation();confirmDelete('${t.id}')">&times;</button>
    <div class="card-task">${escHtml(t.task)}</div>
    <div class="card-meta">${badges}</div>`;
  div.addEventListener('click', () => openEditModal(t.id));
  return div;
}

function escHtml(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function updateCounts() {
  const cols = {todo:0,inprogress:0,paused:0,done:0};
  tasks.forEach(t => { if (cols[t.column] !== undefined) cols[t.column]++; });
  document.getElementById('count-todo').textContent = cols.todo;
  document.getElementById('count-inprogress').textContent = cols.inprogress;
  document.getElementById('count-paused').textContent = cols.paused;
  document.getElementById('count-done').textContent = cols.done;
  document.getElementById('taskCount').textContent = `${tasks.length} tasks total`;
}

// ===== FILTERS =====
function populateFilters() {
  const projects = [...new Set(tasks.map(t=>t.project).filter(Boolean))].sort();
  const owners = [...new Set(tasks.map(t=>t.owner).filter(Boolean))].sort();
  const fp = document.getElementById('filterProject');
  const fo = document.getElementById('filterOwner');
  fp.innerHTML = '<option value="">All Projects</option>' + projects.map(p=>`<option>${escHtml(p)}</option>`).join('');
  fo.innerHTML = '<option value="">All Owners</option>' + owners.map(o=>`<option>${escHtml(o)}</option>`).join('');
}

function applyFilters() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  const proj = document.getElementById('filterProject').value;
  const own = document.getElementById('filterOwner').value;
  const pri = document.getElementById('filterPriority').value;
  let visible = 0;
  document.querySelectorAll('.card').forEach(card => {
    const t = tasks.find(t => t.id === card.dataset.id);
    if (!t) return;
    let show = true;
    if (q && !(t.task||'').toLowerCase().includes(q) && !(t.project||'').toLowerCase().includes(q) && !(t.notes||'').toLowerCase().includes(q) && !(t.owner||'').toLowerCase().includes(q)) show = false;
    if (proj && t.project !== proj) show = false;
    if (own && t.owner !== own) show = false;
    if (pri && t.priority !== pri) show = false;
    card.classList.toggle('card-hidden', !show);
    if (show) visible++;
  });
  updateCounts();
}

// ===== DRAG & DROP =====
let sortableInstances = [];
function initSortable() {
  // Destroy old instances
  sortableInstances.forEach(s => s.destroy());
  sortableInstances = [];

  ['todo','inprogress','paused','done'].forEach(col => {
    const instance = new Sortable(document.getElementById('col-' + col), {
      group: 'kanban',
      animation: 150,
      ghostClass: 'sortable-ghost',
      chosenClass: 'sortable-chosen',
      dragClass: 'sortable-drag',
      onEnd: function(evt) {
        const id = evt.item.dataset.id;
        const newCol = evt.to.id.replace('col-','');
        const t = tasks.find(t => t.id === id);
        if (t) {
          t.column = newCol;
          t.start = (newCol === 'inprogress' || newCol === 'done');
          t.paused = (newCol === 'paused');
          t.done = (newCol === 'done');
          if (newCol === 'todo') { t.start = false; t.paused = false; t.done = false; }
          socket.emit('task-moved', { taskId: id, newColumn: newCol, tasks });
          updateCounts();
        }
      }
    });
    sortableInstances.push(instance);
  });
}

// ===== MODAL =====
function openAddModal(col) {
  editingId = null;
  addToColumn = col;
  document.getElementById('modalTitle').textContent = 'Add New Task';
  document.getElementById('btnDelete').style.display = 'none';
  clearForm();
  showModal();
}

function openEditModal(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  editingId = id;
  addToColumn = null;
  document.getElementById('modalTitle').textContent = 'Edit Task';
  document.getElementById('btnDelete').style.display = '';
  document.getElementById('f-project').value = t.project || '';
  document.getElementById('f-task').value = t.task || '';
  document.getElementById('f-output').value = t.output || '';
  document.getElementById('f-notes').value = t.notes || '';
  document.getElementById('f-owner').value = t.owner || '';
  document.getElementById('f-priority').value = t.priority || '';
  document.getElementById('f-time').value = t.time || '';
  document.getElementById('f-timetaken').value = t.timetaken || '';
  document.getElementById('f-links').value = t.links || '';
  let dl = t.deadline || '';
  if (dl && !dl.match(/^\d{4}-/)) {
    const parts = dl.split('/');
    if (parts.length === 3) dl = `${parts[2]}-${parts[0].padStart(2,'0')}-${parts[1].padStart(2,'0')}`;
    else if (parts.length === 2) dl = `2026-${parts[0].padStart(2,'0')}-${parts[1].padStart(2,'0')}`;
  }
  document.getElementById('f-deadline').value = dl;
  showModal();
}

function clearForm() {
  ['f-project','f-task','f-output','f-notes','f-owner','f-links','f-time','f-timetaken'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-priority').value = '';
  document.getElementById('f-deadline').value = '';
}

function showModal() { document.getElementById('modalOverlay').classList.add('active'); }
function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); editingId = null; addToColumn = null; }

function saveTask() {

    priority: document.getElementById('f-priority').value,
    time: document.getElementById('f-time').value.trim(),
    timetaken: document.getElementById('f-timetaken').value.trim(),
    links: document.getElementById('f-links').value.trim(),
  };
  let dl = document.getElementById('f-deadline').value;
  if (dl) { const d = new Date(dl + 'T00:00:00'); data.deadline = `${d.getMonth()+1}/${d.getDate()}/${d.getFullYear()}`; }
  else data.deadline = '';
  if (!data.task) { alert('Task name is required'); return; }

  if (editingId) {
    const t = tasks.find(t => t.id === editingId);
    if (t) Object.assign(t, data);
    socket.emit('task-edited', { tasks, taskName: data.task });
  } else {
    const col = addToColumn || 'todo';
    const t = {...data, id: generateId(), column: col, start: (col==='inprogress'||col==='done'), paused: col==='paused', done: col==='done'};
    tasks.push(t);
    socket.emit('task-added', { tasks, taskName: data.task });
  }
  populateFilters();
  render();
  initSortable();
  closeModal();
}

function confirmDelete(id) {
  const t = tasks.find(t => t.id === id);
  if (confirm('Delete this task?')) {
    const name = t ? t.task : '';
    tasks = tasks.filter(t => t.id !== id);
    socket.emit('task-deleted', { tasks, taskName: name });
    populateFilters();
    render();
    initSortable();
  }
}

function deleteTask() {
  if (editingId && confirm('Delete this task?')) {
    const t = tasks.find(t => t.id === editingId);
    const name = t ? t.task : '';
    tasks = tasks.filter(t => t.id !== editingId);
    socket.emit('task-deleted', { tasks, taskName: name });
    populateFilters();
    render();
    initSortable();
    closeModal();
  }
}

// ===== CSV EXPORT =====
function exportCSV() {
  const headers = ['Project','Tasks','Output','Time (Hours)','Start','Pause','Done','Notes','Links','Deadline','Time taken','Priority','Owner'];
  const rows = tasks.map(t => [
    t.project || '',t.task || '',t.output || '',t.time || '',
    (t.column === 'inprogress' || t.column === 'done') ? 'TRUE' : 'FALSE',
    t.column === 'paused' ? 'TRUE' : 'FALSE',
    t.column === 'done' ? 'TRUE' : 'FALSE',
    t.notes || '',t.links || '',t.deadline || '',t.timetaken || '',t.priority || '',t.owner || ''
  ]);
  const csvContent = [headers, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csvContent], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'fpw_kanban_export.csv'; a.click();
  URL.revokeObjectURL(url);
}

// ===== RESET =====
function resetBoard() {
  if (confirm('Reset board to original data? All changes will be lost for everyone.')) {
    tasks = getDefaultData();
    socket.emit('board-reset', { tasks });
    populateFilters();
    render();
    initSortable();
  }
}

// ===== KEYBOARD =====
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
</script>
